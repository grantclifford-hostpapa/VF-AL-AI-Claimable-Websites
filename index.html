<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vodafone Business Onboarding — Demo</title>
<style>
  :root {
    --bg: #ffffff;
    --surface: #ffffff;
    --surface-2: #f6f6f6;
    --surface-3: #ececec;
    --text: #1a1a1a;
    --text-2: #6b6b6b;
    --text-3: #9a9a9a;
    --border: rgba(0,0,0,0.08);
    --border-2: rgba(0,0,0,0.16);
    --accent: #e60000;
    --accent-hover: #cc0000;
    --accent-text: #ffffff;
    --info-bg: #e6f1fb;
    --info-fg: #0c447c;
    --success-bg: #e1f5ee;
    --success-fg: #085041;
    --warning-bg: #faeeda;
    --warning-fg: #633806;
    --danger-bg: #fcebeb;
    --danger-fg: #791f1f;
    --radius: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --font: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", Roboto, sans-serif;
    --mono: "SF Mono", Menlo, Monaco, "Cascadia Code", monospace;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #ffffff;
      --surface: #ffffff;
      --surface-2: #f6f6f6;
      --surface-3: #ececec;
      --text: #1a1a1a;
      --text-2: #6b6b6b;
      --text-3: #9a9a9a;
      --border: rgba(0,0,0,0.08);
      --border-2: rgba(0,0,0,0.16);
    }
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  body { min-height: 100vh; }

  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 24px 24px 64px;
  }

  /* Top bar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .brand-logo {
    width: 34px;
    height: 34px;
    flex-shrink: 0;
  }
  .brand-name {
    font-size: 16px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .brand-tag {
    font-size: 11px;
    color: var(--text-2);
    font-weight: 400;
    margin-left: 2px;
  }

  .view-toggle {
    display: inline-flex;
    padding: 3px;
    background: var(--surface-2);
    border-radius: var(--radius);
    gap: 2px;
  }
  .view-toggle button {
    padding: 6px 14px;
    font-size: 13px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    background: transparent;
    color: var(--text);
    font-family: inherit;
  }
  .view-toggle button.active {
    background: var(--surface);
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }

  /* Form elements */
  input[type="text"], input[type="email"], input[type="tel"], input[type="number"], input[type="url"], select {
    width: 100%;
    height: 38px;
    padding: 0 12px;
    background: var(--surface);
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    transition: border 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(230, 0, 0, 0.12);
  }

  button { font-family: inherit; }
  .btn-primary {
    padding: 10px 20px;
    background: var(--accent);
    color: var(--accent-text);
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-secondary {
    padding: 8px 14px;
    background: var(--surface);
    color: var(--text);
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:hover { background: var(--surface-2); }
  .btn-ghost {
    padding: 8px 14px;
    background: transparent;
    color: var(--text);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    cursor: pointer;
  }

  /* Customer screens */
  .customer-wrap {
    max-width: 560px;
    margin: 24px auto 0;
  }
  .hero { text-align: center; margin-bottom: 28px; }
  .hero h1 {
    font-size: 32px;
    font-weight: 500;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  .hero p {
    font-size: 15px;
    color: var(--text-2);
    margin: 0;
  }
  .card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .form-grid label {
    display: block;
    font-size: 12px;
    color: var(--text-2);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .form-error {
    margin-top: 14px;
    padding: 10px 14px;
    background: var(--danger-bg);
    color: var(--danger-fg);
    border-radius: var(--radius);
    font-size: 13px;
    display: none;
  }
  .form-error.show { display: block; }
  .form-footer {
    margin-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .availability {
    font-size: 12px;
    color: var(--text-3);
    margin: 0;
  }

  .perks {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 16px;
  }
  .perk {
    padding: 14px;
    background: var(--surface-2);
    border-radius: var(--radius);
  }
  .perk-title {
    font-size: 13px;
    font-weight: 500;
    margin: 0 0 4px;
  }
  .perk-sub {
    font-size: 12px;
    color: var(--text-2);
    margin: 0;
    line-height: 1.5;
  }

  /* Success screen */
  .success-icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 16px;
    border-radius: 50%;
    background: var(--success-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .link-display {
    padding: 14px;
    background: var(--surface-2);
    border-radius: var(--radius);
    font-family: var(--mono);
    font-size: 13px;
    word-break: break-all;
  }

  /* Agent dashboard */
  .agent-header {
    margin-bottom: 20px;
  }
  .agent-header h1 {
    font-size: 24px;
    font-weight: 500;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .agent-header p {
    font-size: 14px;
    color: var(--text-2);
    margin: 0;
  }

  .tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    border-bottom: 0.5px solid var(--border);
  }
  .tabs button {
    padding: 10px 16px;
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 14px;
    color: var(--text-2);
    border-bottom: 2px solid transparent;
    margin-bottom: -0.5px;
  }
  .tabs button.active {
    color: var(--text);
    font-weight: 500;
    border-bottom-color: var(--accent);
  }

  .metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 20px;
  }
  .metric {
    padding: 16px;
    background: var(--surface-2);
    border-radius: var(--radius);
  }
  .metric-label {
    font-size: 12px;
    color: var(--text-2);
    margin: 0 0 4px;
    font-weight: 500;
  }
  .metric-value {
    font-size: 24px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .toolbar input { flex: 1; min-width: 220px; }
  .filter-group {
    display: inline-flex;
    padding: 3px;
    background: var(--surface-2);
    border-radius: var(--radius);
    gap: 2px;
  }
  .filter-group button {
    padding: 6px 12px;
    font-size: 12px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font-family: inherit;
  }
  .filter-group button.active {
    background: var(--surface);
    font-weight: 500;
  }

  /* Lead/link table */
  .table {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }
  .row {
    display: grid;
    gap: 12px;
    align-items: center;
    padding: 14px 18px;
  }
  .row + .row { border-top: 0.5px solid var(--border); }
  .row-leads {
    grid-template-columns: 36px minmax(0, 1.2fr) minmax(0, 1.3fr) 110px 130px;
  }
  .row-links {
    grid-template-columns: minmax(0, 1fr) 110px 140px 90px;
  }
  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--info-bg);
    color: var(--info-fg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 500;
  }
  .lead-name {
    font-size: 14px;
    font-weight: 500;
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .lead-meta {
    font-size: 12px;
    color: var(--text-2);
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .preview-link {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--info-fg);
    text-decoration: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }
  .preview-link:hover { text-decoration: underline; }
  .add-preview-btn {
    font-size: 11px;
    padding: 4px 10px;
    background: var(--surface-2);
    border: 0.5px dashed var(--border-2);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text-2);
    font-family: inherit;
  }
  .add-preview-btn:hover { background: var(--surface-3); }
  .timestamp {
    font-size: 11px;
    color: var(--text-3);
    margin: 2px 0 0;
  }
  .pill {
    display: inline-block;
    padding: 4px 11px;
    font-size: 11px;
    font-weight: 500;
    border-radius: 999px;
  }
  .status-select {
    width: 100%;
    height: 30px;
    font-size: 12px;
    padding: 0 8px;
  }

  .link-url {
    font-size: 12px;
    font-family: var(--mono);
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .link-url.exhausted { opacity: 0.5; }
  .link-batch {
    font-size: 11px;
    color: var(--text-3);
    margin: 3px 0 0;
  }
  .progress {
    height: 6px;
    background: var(--surface-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--info-fg);
    transition: width 0.3s;
  }
  .progress-fill.exhausted { background: var(--danger-fg); }

  .empty {
    padding: 40px;
    text-align: center;
    color: var(--text-3);
    font-size: 13px;
  }

  .footer-bar {
    margin-top: 14px;
    padding: 12px 16px;
    background: var(--surface-2);
    border-radius: var(--radius);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: var(--text-2);
  }

  /* Upload area */
  .upload-card {
    margin-bottom: 16px;
  }
  .upload-row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  .upload-row label {
    font-size: 12px;
    color: var(--text-2);
  }
  .upload-row input[type="number"] { width: 70px; }

  /* Spinner */
  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--info-fg);
    border-right-color: transparent;
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .building-screen {
    text-align: center;
    padding: 56px 16px;
  }
  .building-icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 20px;
    border-radius: 50%;
    background: var(--info-bg);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 10px 18px;
    background: #1a1a1a;
    color: #ffffff;
    border-radius: var(--radius);
    font-size: 13px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius-lg);
    padding: 24px;
    max-width: 480px;
    width: 100%;
  }
  .modal h3 {
    margin: 0 0 8px;
    font-size: 18px;
    font-weight: 500;
  }
  .modal p {
    margin: 0 0 16px;
    font-size: 14px;
    color: var(--text-2);
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 20px;
  }

  @media (max-width: 720px) {
    .form-grid, .perks, .metrics { grid-template-columns: 1fr 1fr; }
    .row-leads { grid-template-columns: 36px 1fr 90px; }
    .row-leads .col-link, .row-leads .col-status-select { display: none; }
  }

  /* Lead row clickability */
  .row-leads {
    cursor: pointer;
    transition: background 0.1s;
  }
  .row-leads:hover { background: var(--surface-2); }
  .row-leads select, .row-leads button, .row-leads a {
    cursor: default;
  }

  /* Badges */
  .badge-hot {
    display: inline-block;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 500;
    background: var(--danger-bg);
    color: var(--danger-fg);
    border-radius: 999px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge-stalled {
    display: inline-block;
    padding: 2px 8px;
    font-size: 10px;
    font-weight: 500;
    background: var(--warning-bg);
    color: var(--warning-fg);
    border-radius: 999px;
    margin-left: 6px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Drawer */
  .drawer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    display: none;
    z-index: 60;
  }
  .drawer-overlay.show { display: block; }
  .drawer {
    position: fixed;
    top: 0;
    right: 0;
    bottom: 0;
    width: 520px;
    max-width: 100vw;
    background: var(--bg);
    border-left: 0.5px solid var(--border);
    z-index: 61;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .drawer.show { transform: translateX(0); }
  .drawer-header {
    padding: 20px 24px 16px;
    border-bottom: 0.5px solid var(--border);
  }
  .drawer-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    border-radius: var(--radius);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
  }
  .drawer-close:hover { background: var(--surface-2); }
  .drawer-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px 40px;
  }
  .drawer h2 {
    margin: 0 0 4px;
    font-size: 18px;
    font-weight: 500;
  }
  .drawer h3 {
    margin: 24px 0 10px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .drawer h3:first-child { margin-top: 0; }
  .engagement-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .engagement-cell {
    padding: 10px 12px;
    background: var(--surface-2);
    border-radius: var(--radius);
  }
  .engagement-cell-label {
    font-size: 11px;
    color: var(--text-2);
    margin: 0 0 3px;
  }
  .engagement-cell-value {
    font-size: 18px;
    font-weight: 500;
    margin: 0;
  }
  .timeline {
    position: relative;
    padding-left: 20px;
  }
  .timeline::before {
    content: "";
    position: absolute;
    left: 5px;
    top: 4px;
    bottom: 4px;
    width: 1px;
    background: var(--border-2);
  }
  .timeline-item {
    position: relative;
    padding: 0 0 14px;
  }
  .timeline-item:last-child { padding-bottom: 0; }
  .timeline-dot {
    position: absolute;
    left: -20px;
    top: 4px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--surface);
    border: 2px solid var(--text-3);
  }
  .timeline-dot.sent { border-color: var(--info-fg); }
  .timeline-dot.opened { border-color: var(--warning-fg); }
  .timeline-dot.clicked { border-color: var(--success-fg); background: var(--success-fg); }
  .timeline-dot.scheduled { border-color: var(--text-3); background: transparent; border-style: dashed; }
  .timeline-item-title {
    font-size: 13px;
    font-weight: 500;
    margin: 0 0 2px;
  }
  .timeline-item-meta {
    font-size: 11px;
    color: var(--text-3);
    margin: 0;
  }
  .timeline-item-body {
    font-size: 12px;
    color: var(--text-2);
    margin: 4px 0 0;
    line-height: 1.5;
  }
  .template-list {
    display: grid;
    gap: 6px;
  }
  .template-btn {
    padding: 10px 12px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    text-align: left;
    cursor: pointer;
    font-family: inherit;
    color: var(--text);
  }
  .template-btn:hover { background: var(--surface-2); border-color: var(--border-2); }
  .template-btn-title {
    font-size: 13px;
    font-weight: 500;
    margin: 0 0 2px;
  }
  .template-btn-sub {
    font-size: 11px;
    color: var(--text-2);
    margin: 0;
  }
  .email-preview {
    background: var(--surface-2);
    border-radius: var(--radius);
    padding: 14px 16px;
    margin-top: 8px;
  }
  .email-preview-row {
    font-size: 12px;
    color: var(--text-2);
    margin: 0 0 3px;
  }
  .email-preview-row strong {
    color: var(--text);
    font-weight: 500;
    margin-right: 6px;
  }
  .email-preview-body {
    margin-top: 10px;
    padding-top: 10px;
    border-top: 0.5px solid var(--border);
    font-size: 13px;
    line-height: 1.55;
    white-space: pre-wrap;
  }
</style>
</head>
<body>

<div class="page">

      .replace(/\{\{name\}\}/g, lead.name || '')

        if (lead?.assignedLink) {
          window.open(lead.assignedLink, '_blank', 'noopener');
        }
      });
      document.getElementById('btn-restart').addEventListener('click', () => {
        state.form = { name: '', email: '', phone: '', business: '' };
        state.currentLead = null;
        state.step = 1;
        render();
      });
    }
  }

  function handleContinue() {
    const f = state.form;
    const err = document.getElementById('form-error');
    err.classList.remove('show');
    const missing = [];
    if (!f.name.trim()) missing.push('name');
    if (!f.email.trim()) missing.push('email');
    if (!f.phone.trim()) missing.push('phone');
    if (!f.business.trim()) missing.push('business name');
    if (missing.length) {
      err.textContent = 'Please fill in: ' + missing.join(', ');
      err.classList.add('show');
      return;
    }
    if (!/^\S+@\S+\.\S+$/.test(f.email)) {
      err.textContent = "That email address doesn't look right.";
      err.classList.add('show');
      return;
    }
    const link = pickAvailableLink();
    if (!link) {
      err.textContent = 'No builder slots available right now. Please contact support.';
      err.classList.add('show');
      return;
    }
    state.step = 2;
    render();
  }

  function appendCustomerParams(url, lead) {
    try {
      const u = new URL(url);
      // Append customer data as extra query params alongside the existing token.
      // The builder can opt-in to reading these to pre-fill its onboarding form.
      if (lead.name)     u.searchParams.set('name', lead.name);
      if (lead.business) u.searchParams.set('business', lead.business);
      if (lead.email)    u.searchParams.set('email', lead.email);
      if (lead.phone)    u.searchParams.set('phone', lead.phone);
      return u.toString();
    } catch (e) {
      return url;
    }
  }

  function finishHandoff() {
    const link = pickAvailableLink();
    if (!link) {
      state.step = 1;
      render();
      toast('No builder slots available');
      return;
    }
    link.usesLeft -= 1;
    const baseLead = {
      id: uid(),
      name: state.form.name.trim(),
      email: state.form.email.trim(),
      phone: state.form.phone.trim(),
      business: state.form.business.trim(),
      previewUrl: null,
      status: 'awaiting-build',
      createdAt: Date.now(),
      emails: [],
      scheduledEmails: [],
      previewVisits: 0,
      lastPreviewVisitAt: null
    };
    const lead = {
      ...baseLead,
      assignedLink: appendCustomerParams(link.url, baseLead)
    };
    state.leads.unshift(lead);
    state.currentLead = lead;

    // Feature 1: Immediate confirmation email
    sendEmail(lead, 'confirmation');

    // Feature 2: Schedule stalled-help email for later (will fire if still awaiting-build)
    scheduleEmail(lead, 'stalled-help', state.stalledAfterHours * 60 * 60 * 1000,
                  `Auto-send if still awaiting build after ${state.stalledAfterHours}h`);

    state.step = 3;
    saveState();
    render();
  }

  // Feature 3: Drip sequence hook — called whenever a lead's status changes
  function onStatusChange(lead, oldStatus, newStatus) {
    if (newStatus === 'preview-ready' && oldStatus !== 'preview-ready') {
      // Cancel the stalled-help drip if it was scheduled
      cancelScheduled(lead, 'stalled-help');
      // Send the "preview is live" email immediately
      sendEmail(lead, 'preview-ready');
      // Schedule a nudge for 24h later if they haven't been contacted
      scheduleEmail(lead, 'preview-nudge', 24 * 60 * 60 * 1000, 'Nudge if still preview-ready in 24h');
    }
    if (newStatus === 'contacted') {
      cancelScheduled(lead, 'preview-nudge');
      scheduleEmail(lead, 'final-nudge', 72 * 60 * 60 * 1000, 'Final nudge if still contacted after 3 days');
    }
    if (newStatus === 'converted') {
      lead.scheduledEmails = []; // done, stop all automation
    }
    saveState();
  }

  function renderAgentLinks() {
    const body = document.getElementById('agent-body');
    const totalLinks = state.links.length;
    const totalSlots = state.links.reduce((s,l) => s + l.maxUses, 0);
    const usedSlots = state.links.reduce((s,l) => s + (l.maxUses - l.usesLeft), 0);
    const availSlots = totalSlots - usedSlots;
    const exhausted = state.links.filter(l => l.usesLeft === 0).length;

    body.innerHTML = `
      <div class="metrics">
        <div class="metric"><p class="metric-label">Total links</p><p class="metric-value">${totalLinks}</p></div>
        <div class="metric"><p class="metric-label">Slots available</p><p class="metric-value">${availSlots}</p></div>
        <div class="metric"><p class="metric-label">Slots used</p><p class="metric-value">${usedSlots}</p></div>
        <div class="metric"><p class="metric-label">Exhausted</p><p class="metric-value">${exhausted}</p></div>
      </div>
      <div class="card upload-card">
        <p style="font-size:14px; font-weight:500; margin:0 0 4px;">Upload link batch</p>
        <p style="font-size:12px; color:var(--text-2); margin:0 0 14px;">Upload a CSV or Excel file with one builder link per row. Optional second column for max-uses.</p>
        <div class="upload-row">
          <input type="file" id="file-upload" accept=".csv,.xlsx,.xls,.txt" style="display:none;" />
          <button class="btn-secondary" id="btn-upload">Choose file…</button>
          <span id="upload-status" style="font-size:12px; color:var(--text-2);"></span>
          <div style="display:flex; align-items:center; gap:8px; margin-left:auto;">
            <label>Default max uses</label>
            <input type="number" id="default-uses" min="1" max="100" value="${state.defaultMaxUses}" />
          </div>
          <button class="btn-primary" id="btn-add-demo">+ Add 5 demo links</button>
        </div>
      </div>
      <div class="table">
        ${state.links.length === 0 ? `<div class="empty">No links yet. Upload a batch above.</div>` : state.links.map(lnk => {
          const pct = Math.round(((lnk.maxUses - lnk.usesLeft) / lnk.maxUses) * 100);
          const ex = lnk.usesLeft === 0;
          // Build friendly display: domain + user id if we can extract it from the token
          let display = lnk.url;
          try {
            const u = new URL(lnk.url);
            const tokenParam = u.searchParams.get('token') || '';
            const payload = tokenParam.split('.')[0];
            if (payload) {
              const decoded = JSON.parse(atob(decodeURIComponent(payload).replace(/=+$/, '')));
              if (decoded?.user) display = u.hostname + ' · user ' + decoded.user;
              else display = u.hostname;
            } else {
              display = u.hostname + u.pathname;
            }
          } catch (e) { /* fallback to full URL */ }
          return `
            <div class="row row-links">
              <div style="min-width:0;">
                <a href="${esc(lnk.url)}" target="_blank" rel="noopener" class="link-url ${ex ? 'exhausted' : ''}" style="color: var(--info-fg); text-decoration:none;" title="${esc(lnk.url)}">${esc(display)}</a>
                <p class="link-batch">${esc(lnk.batch)}</p>
              </div>
              <div style="font-size:12px; color:var(--text-2);">${lnk.maxUses - lnk.usesLeft} / ${lnk.maxUses} used</div>
              <div class="progress"><div class="progress-fill ${ex ? 'exhausted' : ''}" style="width:${pct}%;"></div></div>
              <div style="text-align:right; font-size:11px; font-weight:500;">
                ${ex ? `<span style="color:var(--danger-fg);">Exhausted</span>` : `<span style="color:var(--success-fg);">${lnk.usesLeft} left</span>`}
              </div>
            </div>`;
        }).join('')}
      </div>`;

    document.getElementById('default-uses').addEventListener('change', e => {
      state.defaultMaxUses = Math.max(1, parseInt(e.target.value) || 1);
      saveState();
    });
    document.getElementById('btn-upload').addEventListener('click', () => {
      document.getElementById('file-upload').click();
    });
    document.getElementById('file-upload').addEventListener('change', handleFileUpload);
    document.getElementById('btn-add-demo').addEventListener('click', () => {
      const batchName = 'Batch-' + String.fromCharCode(65 + Math.floor(state.links.length / 5));
      for (let i = 0; i < 5; i++) {
        const id = Math.random().toString(36).slice(2, 8);
        state.links.push({
          url: 'https://builder.example.com/start/' + id,
          maxUses: state.defaultMaxUses,
          usesLeft: state.defaultMaxUses,
          batch: batchName
        });
      }
      saveState();
      renderAgentLinks();
      toast('Added 5 demo links');
    });
  }

  function handleFileUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
      const batchName = 'Batch-' + String.fromCharCode(65 + Math.floor(state.links.length / 5));
      let added = 0;
      lines.forEach(line => {
        const parts = line.split(/[,;\t]/).map(p => p.trim().replace(/^["']|["']$/g, ''));
        const url = parts[0];
        const maxUses = parseInt(parts[1]) || state.defaultMaxUses;
        if (/^https?:\/\//.test(url)) {
          state.links.push({ url, maxUses, usesLeft: maxUses, batch: batchName });
          added++;
        }
      });
      if (added) {
        saveState();
        renderAgentLinks();
        toast(`Imported ${added} link${added === 1 ? '' : 's'}`);
      } else {
        toast('No valid URLs found');
      }
    };
    reader.readAsText(file);
    e.target.value = '';
  }

  function showTemplatePreview(lead, templateKey) {
    const tmpl = EMAIL_TEMPLATES[templateKey];
    if (!tmpl) return;
    const merged = mergeTemplate(tmpl, lead);

    preview.innerHTML = `
      <div class="email-preview">

        <p class="email-preview-row"><strong>Subject:</strong>${esc(merged.subject)}</p>

        <div style="display:flex; gap:8px; margin-top:12px;">
          <button class="btn-primary" id="preview-send" style="flex:1;">Send now</button>
          <button class="btn-ghost" id="preview-cancel">Cancel</button>
        </div>
      </div>
    `;
    document.getElementById('preview-send').onclick = () => {
      sendEmail(lead, templateKey, { manual: true });
      toast('Email sent to ' + lead.email);
      renderDrawer(lead);
    };
    document.getElementById('preview-cancel').onclick = () => {
      preview.innerHTML = '';
    };
    // Scroll preview into view
    preview.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function exportLeadsCSV() {
    const rows = [['Name','Email','Phone','Business','Assigned link','Preview URL','Status','Created']];
    state.leads.forEach(l => rows.push([
      l.name, l.email, l.phone, l.business, l.assignedLink, l.previewUrl || '', l.status, new Date(l.createdAt).toISOString()
    ]));
    const csv = rows.map(r => r.map(c => '"' + String(c || '').replace(/"/g, '""') + '"').join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'sitespark-leads.csv';
    a.click();
    toast('CSV exported');
  }

  // -------------------- Main --------------------
  function render() {
    document.querySelectorAll('#view-toggle button').forEach(b => {
      b.classList.toggle('active', b.dataset.view === state.view);
    });
    if (state.view === 'customer') renderCustomer();
    else renderAgent();
  }

  document.querySelectorAll('#view-toggle button').forEach(b => {
    b.addEventListener('click', () => {
      closeDrawer();
      state.view = b.dataset.view;
      render();
    });
  });

  // Reset button (hold shift + click brand to wipe demo data)
  document.querySelector('.brand').addEventListener('click', e => {
    if (e.shiftKey) {
      if (confirm('Reset all demo data?')) {
        localStorage.removeItem(STORAGE_KEY);
        location.reload();
      }
    }
  });

  render();
})();
</script>
</body>
</html>
